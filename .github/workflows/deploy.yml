name: Deploy to Railway

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run Unit Tests
        run: npm run test:coverage

      - name: Start MySQL and Redis for E2E tests
        run: |
          docker run -d --name test-mysql -e MYSQL_ROOT_PASSWORD=root -e MYSQL_DATABASE=delivery_db_test -p 3307:3306 mysql:latest
          docker run -d --name test-redis -p 6380:6379 redis:latest

      - name: Wait for MySQL to be ready
        run: |
          until docker exec test-mysql mysql -uroot -proot -e "SELECT 1"; do
            echo "⏳ Waiting for MySQL...";
            sleep 2;
          done

      - name: Run E2E Tests
        run: npm run test:e2e

      - name: Build Project
        run: npm run build

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --project=13cae05d-f732-4ece-9611-ca4945d256bf --service=express-api --environment=production
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
